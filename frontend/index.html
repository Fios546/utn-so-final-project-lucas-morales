<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale = 1.0"/>
  <title>Estudiantes</title>
  <link rel="stylesheet" href="styles_modern.css" />
</head>

<body>
  <h1>Lista de Estudiantes</h1>
  <button id="loadButton">Cargar Estudiantes</button>

  <div id="mainLayout">
    <table id="studentsTable">
      <thead>
        <tr>
          <th>Id</th>
          <th>Nombre</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <div id="greetPanel">
      <input type="text" id="nameInput" placeholder="Ingresá un nombre...">
      <button id="HiButton" disabled>Mostrar</button>
      <p id="greetMessage"></p>
    </div>

    <div id="addPanel">
      <input type="text" id="newStudentInput" placeholder="Nombre del estudiante...">
      <button id="addButton" disabled>Agregar Estudiante</button>
      <p id="addMessage"></p>
    </div>

  </div>

  <script src="script.js"></script>
</body>

</html>
